<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- Nunito loaded async to avoid blocking -->
    <script>
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap';
      document.head.appendChild(l);
    </script>
    <!-- Pixel font for title -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
    <title>Clan Royale</title>

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        background: #000;
        color: #ccc;
        font-family: "Nunito", sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-container {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-container > canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ---- Landing overlay ---- */
      #landing {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      }

      #landing.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #particles {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      /* Subtle vignette */
      #landing::before {
        content: '';
        position: absolute;
        inset: 0;
        z-index: 1;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
        pointer-events: none;
      }

      #landing-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        perspective: 800px;
      }

      /* ---- 3D Title (static) ---- */
      .title-wrapper {
        position: relative;
        margin-bottom: 12px;
        transform: rotateX(8deg);
        transform-style: preserve-3d;
      }

      #landing-title {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(36px, 10vw, 96px);
        color: #DAA520;
        text-align: center;
        letter-spacing: clamp(4px, 1.2vw, 14px);
        line-height: 1.3;
        position: relative;
        z-index: 2;
        background: linear-gradient(
          180deg,
          #E8D090 0%,
          #DAA520 35%,
          #B8860B 65%,
          #8B6914 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* 3D depth extrusion layer */
      .title-depth {
        position: absolute;
        inset: 0;
        font-family: "Press Start 2P", monospace;
        font-size: clamp(36px, 10vw, 96px);
        letter-spacing: clamp(4px, 1.2vw, 14px);
        line-height: 1.3;
        text-align: center;
        color: #6B4F0E;
        z-index: 1;
        text-shadow:
          0 1px 0 #5C420C,
          0 2px 0 #4D360A,
          0 3px 0 #3E2A08,
          0 4px 0 #2F1E06,
          0 5px 0 #201204,
          0 6px 0 #110602,
          0 8px 12px rgba(0,0,0,0.4),
          0 12px 25px rgba(0,0,0,0.3);
      }

      /* Decorative divider line */
      .landing-divider {
        width: clamp(120px, 30vw, 320px);
        height: 1px;
        background: linear-gradient(90deg, transparent, #8B6914 30%, #B8860B, #8B6914 70%, transparent);
        margin: 18px 0 32px;
      }

      /* ---- Enter button ---- */
      #enter-btn {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(10px, 1.4vw, 13px);
        color: #1a1000;
        background: linear-gradient(180deg, #DAA520, #B8860B 60%, #8B6914);
        border: 2px solid #6B4F0E;
        border-radius: 0;
        padding: 16px 40px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: transform 0.15s, border-color 0.15s;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        box-shadow:
          0 0 10px rgba(184, 134, 11, 0.15),
          inset 0 1px 0 rgba(255,255,255,0.15);
        position: relative;
      }

      /* Subtle glow pulse — opacity only (GPU-friendly) */
      #enter-btn::after {
        content: '';
        position: absolute;
        inset: -4px;
        background: transparent;
        box-shadow: 0 0 12px rgba(184, 134, 11, 0.2);
        opacity: 0;
        animation: btn-glow 3s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes btn-glow {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }

      #enter-btn:hover {
        transform: scale(1.05);
        box-shadow:
          0 0 15px rgba(184, 134, 11, 0.25),
          inset 0 1px 0 rgba(255,255,255,0.2);
        border-color: #B8860B;
      }

      #enter-btn:active {
        transform: scale(0.97);
        background: linear-gradient(180deg, #DAA520, #B8960F);
      }

      .ai-mode-btn {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(6px, 0.9vw, 8px);
        color: #DAA520;
        background: rgba(184, 134, 11, 0.1);
        border: 1px solid rgba(184, 134, 11, 0.35);
        border-radius: 0;
        padding: 10px 18px;
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: transform 0.15s, background 0.15s, border-color 0.15s;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      .ai-mode-btn:hover {
        transform: scale(1.05);
        background: rgba(184, 134, 11, 0.2);
        border-color: rgba(184, 134, 11, 0.6);
      }

      .ai-mode-btn:active {
        transform: scale(0.97);
        background: rgba(184, 134, 11, 0.25);
      }

      #ai-ft-btn {
        color: #4af;
        border-color: rgba(68, 170, 255, 0.35);
        background: rgba(68, 170, 255, 0.08);
      }

      #ai-ft-btn:hover {
        background: rgba(68, 170, 255, 0.18);
        border-color: rgba(68, 170, 255, 0.6);
      }

      #mic-error {
        font-family: "Press Start 2P", monospace;
        font-size: 8px;
        color: #FF6B6B;
        margin-top: 12px;
        opacity: 0;
        transition: opacity 0.3s;
        text-align: center;
        line-height: 1.6;
      }

      #mic-error.visible {
        opacity: 1;
      }

      /* ---- Report button (bottom-right) ---- */
      #report-btn {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 101;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid #6B4F0E;
        background: linear-gradient(180deg, #DAA520, #B8860B 60%, #8B6914);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 10px rgba(184, 134, 11, 0.25);
        transition: transform 0.15s, box-shadow 0.15s;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        text-decoration: none;
      }

      #report-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 18px rgba(184, 134, 11, 0.4);
      }

      #report-btn:active {
        transform: scale(0.95);
      }

      #report-btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: #1a1000;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

    </style>

  </head>
  <body>
    <!-- Landing overlay -->
    <div id="landing">
      <canvas id="particles"></canvas>
      <div id="landing-content">
        <div class="title-wrapper">
          <div class="title-depth" aria-hidden="true">CLAN<br>ROYALE</div>
          <div id="landing-title">CLAN<br>ROYALE</div>
        </div>
        <div class="landing-divider"></div>
        <button id="enter-btn">ENTER BATTLE</button>
        <div style="display:flex;gap:10px;margin-top:14px;">
          <button class="ai-mode-btn" id="play-base-btn">PLAY (BASE)</button>
          <button class="ai-mode-btn" id="play-ft-btn">PLAY (FINE-TUNED)</button>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="ai-mode-btn" id="ai-base-btn">BASE vs BASE</button>
          <button class="ai-mode-btn" id="ai-ft-btn">FINE-TUNED vs BASE</button>
        </div>
        <div id="mic-error"></div>
      </div>
    </div>

    <!-- Report link -->
    <a id="report-btn" title="Evaluation Report" target="_blank">
      <svg viewBox="0 0 24 24">
        <path d="M9 3L9 8C9 8 7 12 7 15C7 18 9 21 12 21C15 21 17 18 17 15C17 12 15 8 15 8L15 3"/>
        <line x1="9" y1="3" x2="15" y2="3"/>
        <line x1="9" y1="8" x2="15" y2="8"/>
        <circle cx="11" cy="15" r="1" fill="#1a1000" stroke="none"/>
        <circle cx="14" cy="13" r="0.7" fill="#1a1000" stroke="none"/>
      </svg>
    </a>

    <div id="game-container"></div>

    <script>
      // ---- Particle system (cinematic) ----
      (function() {
        var canvas = document.getElementById("particles");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var running = true;
        var COLORS = [
          { r: 184, g: 134, b: 11 },   // dark goldenrod
          { r: 218, g: 165, b: 32 },   // goldenrod
          { r: 160, g: 140, b: 100 },  // muted tan
          { r: 120, g: 120, b: 120 },  // grey
          { r: 139, g: 105, b: 20 }    // dark gold
        ];
        var COUNT = 50;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        function spawn(yOverride) {
          var c = COLORS[Math.floor(Math.random() * COLORS.length)];
          var depthLayer = Math.random(); // 0 = far, 1 = near
          return {
            x: Math.random() * canvas.width,
            y: yOverride !== undefined ? yOverride : canvas.height + Math.random() * 40,
            size: 1 + depthLayer * 4,
            speed: 0.15 + depthLayer * 0.6,
            wobbleAmp: 0.2 + Math.random() * 0.8,
            wobbleFreq: 0.005 + Math.random() * 0.015,
            phase: Math.random() * Math.PI * 2,
            r: c.r, g: c.g, b: c.b,
            alpha: 0.15 + depthLayer * 0.25,
            age: 0
          };
        }

        for (var i = 0; i < COUNT; i++) {
          particles.push(spawn(Math.random() * canvas.height));
        }

        function tick() {
          if (!running) return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.age++;
            p.y -= p.speed;
            p.x += Math.sin(p.age * p.wobbleFreq + p.phase) * p.wobbleAmp;

            var fadeZone = canvas.height * 0.2;
            var alpha = p.alpha;
            if (p.y < fadeZone) {
              alpha *= (p.y / fadeZone);
            }

            if (p.y < -10 || alpha <= 0.01) {
              particles[i] = spawn();
              continue;
            }

            // Core pixel
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "rgb(" + p.r + "," + p.g + "," + p.b + ")";
            var half = Math.round(p.size / 2);
            ctx.fillRect(
              Math.round(p.x - half),
              Math.round(p.y - half),
              Math.round(p.size),
              Math.round(p.size)
            );
          }
          ctx.globalAlpha = 1;
          requestAnimationFrame(tick);
        }
        tick();

        window.__stopParticles = function() { running = false; };
      })();


      // ---- Mic + launch ----
      document.getElementById("enter-btn").addEventListener("click", function() {
        var btn = this;
        btn.disabled = true;
        btn.textContent = "...";
        window.gameMode = 'player';

        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) {
            window.__micStream = stream;
            dismissLanding();
          })
          .catch(function() {
            var err = document.getElementById("mic-error");
            err.textContent = "MIC DENIED — TEXT-ONLY MODE";
            err.classList.add("visible");
            setTimeout(dismissLanding, 1500);
          });
      });

      // ---- Play with base Qwen connector ----
      document.getElementById("play-base-btn").addEventListener("click", function() {
        window.gameMode = 'player';
        window.connectorModel = 'qwen-base';
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) { window.__micStream = stream; dismissLanding(); })
          .catch(function() {
            var err = document.getElementById("mic-error");
            err.textContent = "MIC DENIED — TEXT-ONLY MODE";
            err.classList.add("visible");
            setTimeout(dismissLanding, 1500);
          });
      });

      // ---- Play with fine-tuned Qwen connector ----
      document.getElementById("play-ft-btn").addEventListener("click", function() {
        window.gameMode = 'player';
        window.connectorModel = 'qwen-finetuned';
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) { window.__micStream = stream; dismissLanding(); })
          .catch(function() {
            var err = document.getElementById("mic-error");
            err.textContent = "MIC DENIED — TEXT-ONLY MODE";
            err.classList.add("visible");
            setTimeout(dismissLanding, 1500);
          });
      });

      // ---- AI vs AI (spectator) launch — Base vs Base ----
      document.getElementById("ai-base-btn").addEventListener("click", function() {
        window.gameMode = 'spectator';
        window.spectatorModelType = 'base';
        dismissLanding();
      });

      // ---- AI vs AI (spectator) launch — Fine-tuned vs Base ----
      document.getElementById("ai-ft-btn").addEventListener("click", function() {
        window.gameMode = 'spectator';
        window.spectatorModelType = 'finetuned';
        dismissLanding();
      });

      // ---- Report button ----
      document.getElementById("report-btn").addEventListener("click", function(e) {
        e.preventDefault();
        window.open(window.location.origin + "/report.html", "_blank");
      });

      function dismissLanding() {
        var landing = document.getElementById("landing");
        landing.classList.add("fade-out");
        window.__stopParticles();
        setTimeout(function() {
          landing.style.display = "none";
          if (typeof window.startGame === "function") {
            window.startGame();
          }
        }, 600);
      }
    </script>

    <script src="./index.js"></script>
  </body>
</html>
